<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>GathUp - موقع تعارف</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f5f5ff;
      direction: rtl;
      text-align: center;
      padding: 40px;
    }
    .container {
      background-color: #fff;
      border-radius: 10px;
      padding: 30px;
      max-width: 480px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    select, input, textarea, button {
      width: 90%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #6b4eff;
      color: white;
      border: none;
      cursor: pointer;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background-color: #eee;
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="title">مرحبًا بك في GathUp!</h1>

    <select id="language" onchange="switchLanguage()">
      <option value="ar">العربية</option>
      <option value="en">English</option>
      <option value="fr">Français</option>
    </select>

    <input type="text" id="name" placeholder="الاسم">
    <input type="number" id="age" placeholder="العمر">
    <input type="text" id="city" placeholder="المدينة">
    <textarea id="hobbies" placeholder="الهوايات"></textarea>
    <button onclick="saveUser()" id="btnSave">تسجيل</button>

    <h2 id="registeredTitle">الأشخاص المسجلين:</h2>
    <ul id="userList"></ul>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "ضع المفتاح هنا",
      authDomain: "ضع النطاق هنا",
      databaseURL: "https://مشروعك.firebaseio.com",
      projectId: "اسم المشروع",
      storageBucket: "اسم المشروع.appspot.com",
      messagingSenderId: "رقم المرسل",
      appId: "معرّف التطبيق"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const nameInput = document.getElementById("name");
    const ageInput = document.getElementById("age");
    const cityInput = document.getElementById("city");
    const hobbiesInput = document.getElementById("hobbies");
    const userList = document.getElementById("userList");

    window.saveUser = function () {
      const name = nameInput.value.trim();
      const age = ageInput.value.trim();
      const city = cityInput.value.trim();
      const hobbies = hobbiesInput.value.trim();

      if (!name || !age || !city || !hobbies) return;

      const userRef = ref(db, 'users/' + Date.now());
      set(userRef, { name, age, city, hobbies });

      nameInput.value = "";
      ageInput.value = "";
      cityInput.value = "";
      hobbiesInput.value = "";
    };

    onValue(ref(db, 'users'), (snapshot) => {
      userList.innerHTML = "";
      const data = snapshot.val();
      for (let key in data) {
        const user = data[key];
        const li = document.createElement("li");
        li.innerHTML = `<strong>${user.name}</strong><br>
                        ${getLabel("age")}: ${user.age}<br>
                        ${getLabel("city")}: ${user.city}<br>
                        ${getLabel("hobbies")}: ${user.hobbies}`;
        userList.appendChild(li);
      }
    });

    const translations = {
      ar: {
        title: "مرحبًا بك في GathUp!",
        age: "العمر",
        city: "المدينة",
        hobbies: "الهوايات",
        save: "تسجيل",
        registered: "الأشخاص المسجلين:"
      },
      en: {
        title: "Welcome to GathUp!",
        age: "Age",
        city: "City",
        hobbies: "Hobbies",
        save: "Register",
        registered: "Registered Users:"
      },
      fr: {
        title: "Bienvenue sur GathUp !",
        age: "Âge",
        city: "Ville",
        hobbies: "Loisirs",
        save: "S'inscrire",
        registered: "Utilisateurs inscrits :"
      }
    };

    let currentLang = "ar";

    window.switchLanguage = function () {
      currentLang = document.getElementById("language").value;
      document.getElementById("title").textContent = translations[currentLang].title;
      document.getElementById("age").placeholder = translations[currentLang].age;
      document.getElementById("city").placeholder = translations[currentLang].city;
      document.getElementById("hobbies").placeholder = translations[currentLang].hobbies;
      document.getElementById("btnSave").textContent = translations[currentLang].save;
      document.getElementById("registeredTitle").textContent = translations[currentLang].registered;
    };

    function getLabel(key) {
      return translations[currentLang][key];
    }
  </script>
</body>
</html>
